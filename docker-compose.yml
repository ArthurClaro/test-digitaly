services:
  postgres:
    image: postgres:16-alpine
    container_name: digitaly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: digitaly
      POSTGRES_PASSWORD: digitaly
      POSTGRES_DB: digitaly
    ports:
      - "5433:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U digitaly -d digitaly"]
      interval: 5s
      timeout: 5s
      retries: 10
